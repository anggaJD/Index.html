<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOH Daily Checklist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#1e1e2f,#2c2c44);
    color: #333;
}

.container {
    max-width: 850px;
    margin: 40px auto;
    padding: 20px;
}

.card {
    background: #ffffff;
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

h1 {
    color: white;
    text-align: center;
    font-weight: 700;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    color: #bbb;
    margin-bottom: 30px;
    font-size: 14px;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 15px;
    font-size: 14px;
}

label {
    display: flex;
    align-items: center;
    padding: 8px;
    border-radius: 8px;
    transition: 0.2s;
}

label:hover {
    background: #f5f7fa;
}

input[type="checkbox"] {
    margin-right: 12px;
    transform: scale(1.2);
}

.progress-wrapper {
    margin-top: 15px;
}

.progress-bar {
    height: 10px;
    background: #eee;
    border-radius: 20px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#4caf50,#2ecc71);
    transition: width 0.4s ease;
}

.progress-text {
    font-size: 13px;
    margin-top: 8px;
    font-weight: 600;
}

.button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.primary {
    background: linear-gradient(90deg,#111,#333);
    color: white;
}

.primary:hover {
    opacity: 0.9;
}

.success {
    background: linear-gradient(90deg,#4caf50,#2ecc71);
}

.badge {
    display: inline-block;
    padding: 6px 12px;
    background: #2ecc71;
    color: white;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>FOH Daily Operational Checklist</h1>
<div class="subtitle">Professional Offline System</div>

<div class="card">
<strong>Date:</strong> <span id="todayDate"></span><br><br>

Staff Name:
<input type="text" id="staffName" placeholder="Enter staff name">

Role:
<select id="role">
<option>Server</option>
<option>Leader</option>
<option>Supervisor</option>
</select>

Shift:
<select id="shift">
<option>Opening</option>
<option>Closing</option>
</select>
</div>

<div class="card">
<h3>Checklist</h3>
<div id="checklistContainer"></div>

<div class="progress-wrapper">
<div class="progress-bar">
<div class="progress" id="progressBar"></div>
</div>
<div class="progress-text"><span id="progressText">0%</span> Completed</div>
</div>
</div>

<button class="button primary" id="completeBtn" onclick="completeShift()">Mark Shift Completed</button>
<div id="completeBadge"></div>

</div>

<script>

const openingTasks = [...Array(20).keys()].map((i,idx)=>[
"Be ready for service (10:55)",
"Set playlist and adjust outlet volume (10:50)",
"Assign stations and double-check readiness (10:50)",
"Set main dining calendar",
"Check all condiments, tissues, and stock supplies",
"Update bar and kitchen stock",
"Return plants to designated positions (10:30)",
"Clean glass doors and windows",
"Spray insect repellent and air freshener",
"Prepare indoor and outdoor dining areas",
"Fold and hang cleaning cloths if still damp",
"Sweep and mop all areas",
"Wipe tables and arrange table and chair layout neatly",
"Re-polish cutlery (ensure no fingerprints)",
"Set up plates and cutlery",
"Turn on ESB computer and start POS system",
"Turn on EDC and cashier equipment",
"Check paper rolls and perform test print on EDC & POS",
"Turn on AC and all lighting",
"Water and maintain plants"
][idx]);

const closingTasks = [
"Lock all outlet doors and store keys in designated place",
"Double-check all areas and dispose of trash bags",
"Clock out and record overtime (if any)",
"Clear and store speaker, outlet phone, and bench (weekend only)",
"Spray insect repellent throughout indoor area (after guests leave)",
"Charge EDC, iPad, and outlet phone",
"Shut down POS after completing all reports",
"Turn off AC, lights, and speakers",
"Rearrange tables and chairs to standard layout",
"Refill all condiments and utilities",
"Prepare pizza boxes for the next day",
"Sweep all indoor dining areas (after guests leave)",
"Check product and floor supplies stock",
"Submit purchase request if stock is low",
"Bring in front chairs and umbrella stand",
"Close POS (ensure balance and no open bills)",
"Clear tables and remove plates and cutlery",
"Soak cleaning cloths",
"Polish cutlery and saucers",
"Rinse and hang cleaning cloths to dry"
];

const today = new Date().toISOString().split("T")[0];
document.getElementById("todayDate").innerText = today;

function autoResetDaily() {
const savedDate = localStorage.getItem("checklistDate");
if (savedDate !== today) {
localStorage.clear();
localStorage.setItem("checklistDate", today);
}
}

function loadChecklist() {
const shift = document.getElementById("shift").value;
const tasks = shift === "Opening" ? openingTasks : closingTasks;
const container = document.getElementById("checklistContainer");
container.innerHTML = "";

tasks.forEach((task, index) => {
const id = shift + "-" + index;
const saved = localStorage.getItem(id);

const label = document.createElement("label");
const checkbox = document.createElement("input");
checkbox.type = "checkbox";
checkbox.checked = saved === "true";

checkbox.addEventListener("change", () => {
localStorage.setItem(id, checkbox.checked);
updateProgress(tasks.length, shift);
});

label.appendChild(checkbox);
label.appendChild(document.createTextNode(task));
container.appendChild(label);
});

updateProgress(tasks.length, shift);
}

function updateProgress(total, shift) {
let completed = 0;
for (let i = 0; i < total; i++) {
if (localStorage.getItem(shift + "-" + i) === "true") {
completed++;
}
}
const percent = Math.round((completed / total) * 100);
document.getElementById("progressBar").style.width = percent + "%";
document.getElementById("progressText").innerText = percent + "%";
}

function completeShift() {
const percent = document.getElementById("progressText").innerText;
if (percent !== "100%") {
alert("All tasks must be completed before marking shift complete.");
return;
}
document.getElementById("completeBtn").classList.remove("primary");
document.getElementById("completeBtn").classList.add("success");
document.getElementById("completeBtn").innerText = "Shift Completed ✓";
document.getElementById("completeBadge").innerHTML = "<div class='badge'>Ready for Screenshot</div>";
}

document.getElementById("shift").addEventListener("change", loadChecklist);

autoResetDaily();
loadChecklist();

</script>

</body>
</html>
